name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CI checks
        run: npm run ci

      - name: Build app
        env:
          VITE_GIT_SHA: ${{ github.sha }}
        run: npm run build

      - name: Archive dist
        run: tar -czf hda-vault-web-${{ github.ref_name }}.tar.gz dist

      - name: Build Docker image
        run: docker build -t hda-vault:${{ github.ref_name }} .

      - name: Save Docker image
        run: docker save hda-vault:${{ github.ref_name }} | gzip > hda-vault-docker-${{ github.ref_name }}.tar.gz

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hda-vault-web-${{ github.ref_name }}.tar.gz
            hda-vault-docker-${{ github.ref_name }}.tar.gz
            CHANGELOG.md
            docs/MIGRATIONS.md
